<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的借阅与预约 - 图书推荐系统</title>
  <link rel="stylesheet" href="assets/css/common.css" />
  <link rel="stylesheet" href="assets/css/borrowings.css" />
</head>
<body data-page="borrowings">
  <div class="app-shell">
    <main class="page">
      <div id="loan-message" class="alert hidden"></div>
      <section class="page-header">
        <div>
          <h1 class="page-title">我的借阅与预约</h1>
          <p class="page-subtitle">处理续借、归还和预约，清楚掌握每一本书的当前状态。</p>
        </div>
        <div class="form-actions">
          <button id="reload-loans" type="button">刷新</button>
          <a href="books.html"><button type="button">浏览图书</button></a>
        </div>
      </section>

      <section class="grid two">
        <article class="card">
          <div class="section-head">
            <div>
              <h2>当前借阅</h2>
              <p class="muted">快到期的借阅可以优先处理，避免忘记归还。</p>
            </div>
          </div>
          <div class="hover-scroll-shell">
            <div id="active-loans" class="loan-list hover-scroll-window scroll-size-md"></div>
          </div>
        </article>

        <article class="card">
          <div class="section-head">
            <div>
              <h2>借阅历史</h2>
              <p class="muted">已归还的图书会保留在这里，方便回看自己的阅读轨迹。</p>
            </div>
          </div>
          <div class="hover-scroll-shell">
            <div id="loan-history" class="loan-list hover-scroll-window scroll-size-lg"></div>
          </div>
        </article>
      </section>

      <section class="grid two borrowings-section">
        <article class="card">
          <div class="section-head">
            <div>
              <h2>当前预约</h2>
              <p class="muted">排队中的预约会持续保留，直到你取消或成功借到该书。</p>
            </div>
          </div>
          <div class="hover-scroll-shell">
            <div id="active-reservations" class="loan-list hover-scroll-window scroll-size-md"></div>
          </div>
        </article>

        <article class="card">
          <div class="section-head">
            <div>
              <h2>预约历史</h2>
              <p class="muted">这里会记录已经完成或取消的预约。</p>
            </div>
          </div>
          <div class="hover-scroll-shell">
            <div id="reservation-history" class="loan-list hover-scroll-window scroll-size-lg"></div>
          </div>
        </article>
      </section>
    </main>
  </div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/borrowings.js"></script>
</body>
</html>
