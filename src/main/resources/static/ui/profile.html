<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的资料 - 图书推荐系统</title>
  <link rel="stylesheet" href="assets/css/common.css" />
  <link rel="stylesheet" href="assets/css/profile.css" />
</head>
<body data-page="profile">
  <div class="app-shell">
    <main class="page">
      <div class="page-header">
        <div>
          <h1 class="page-title">我的资料</h1>
          <p class="page-subtitle">在这里维护账号信息和阅读偏好，让推荐结果更贴近你的兴趣。</p>
        </div>
      </div>

      <div id="profile-message" class="alert hidden"></div>

      <section class="grid two">
        <article class="card">
          <h2>账号信息</h2>
          <div class="info-list">
            <div class="info-item"><div class="info-key">用户 ID</div><div id="profile-id" class="info-value">-</div></div>
            <div class="info-item"><div class="info-key">邮箱</div><div id="profile-email-view" class="info-value">-</div></div>
          </div>

          <form id="profile-form" class="form-grid profile-form">
            <input id="profile-id-input" type="hidden" />
            <div class="field"><label class="label">名</label><input id="firstName" /></div>
            <div class="field"><label class="label">姓</label><input id="lastName" /></div>
            <div class="field"><label class="label">邮箱</label><input id="email" type="email" /></div>
            <div class="field"><label class="label">密码（可留空）</label><input id="password" type="password" /></div>
            <div class="field"><label class="label">手机号</label><input id="phoneNumber" /></div>
            <div class="field"><label class="label">出生日期</label><input id="birthdate" type="text" inputmode="numeric" placeholder="YYYY/MM/DD" /></div>
            <div class="field"><label class="label">国家</label><input id="country" /></div>
            <div class="field"><label class="label">年龄</label><input id="age" type="number" /></div>
            <div class="field">
              <label class="label">性别</label>
              <select id="gender">
                <option value="">请选择</option>
                <option value="MALE">男</option>
                <option value="FEMALE">女</option>
                <option value="OTHERS">其他</option>
              </select>
            </div>
            <div class="field">
              <label class="label">婚姻状态</label>
              <select id="maritalStatus">
                <option value="">请选择</option>
                <option value="SINGLE">未婚</option>
                <option value="MARRIED">已婚</option>
                <option value="IN_RELATIONSHIP">恋爱中</option>
              </select>
            </div>
            <div class="field full"><label class="label">头像地址</label><input id="imageUrl" /></div>
            <div class="field full">
              <div class="form-actions">
                <button class="primary" type="submit">保存个人资料</button>
              </div>
            </div>
          </form>
        </article>

        <article class="card">
          <h2>阅读偏好</h2>
          <div id="reading-message" class="alert hidden"></div>
          <form id="reading-form" class="form-grid">
            <input id="reading-user-id" type="hidden" />
            <div class="field">
              <label class="label">阅读等级</label>
              <select id="readingLevel">
                <option value="BEGINNER">入门</option>
                <option value="INTERMEDIATE">进阶</option>
                <option value="EXPERT">专家</option>
              </select>
            </div>
            <div class="field full"><label class="label">偏好分类</label><input id="categoryIds" placeholder="例如：1,2,5" /></div>
            <div class="field full">
              <div class="form-actions">
                <button class="primary" type="submit">保存阅读偏好</button>
              </div>
            </div>
          </form>
          <div class="alert info profile-reading-note">可填写多个分类编号，并使用英文逗号分隔，例如 1,2,5。</div>
        </article>
      </section>
    </main>
  </div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/profile.js"></script>
</body>
</html>
