# server
server.port=${SERVER_PORT:8010}
server.servlet.context-path=${SERVER_CONTEXT_PATH:/readseek-service}
spring.application.name=readseek

# Observability
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:when_authorized}
management.info.env.enabled=${MANAGEMENT_INFO_ENV_ENABLED:true}
info.app.name=ReadSeek
info.app.description=Reading-resource discovery system with hybrid retrieval and explainable recommendation
info.app.version=${READSEEK_VERSION:0.0.1-SNAPSHOT}

# Spring postgres datasource
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5043/book_recommendation_system}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:20041117}
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
spring.elasticsearch.connection-timeout=${SPRING_ELASTICSEARCH_CONNECTION_TIMEOUT:5s}
spring.elasticsearch.socket-timeout=${SPRING_ELASTICSEARCH_SOCKET_TIMEOUT:10s}

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=${SPRING_DATA_REDIS_TIMEOUT:2s}
spring.data.redis.repositories.enabled=false
readseek.redis.key-prefix=${READSEEK_REDIS_KEY_PREFIX:readseek}
readseek.reservation.dedupe-ttl=${READSEEK_RESERVATION_DEDUPE_TTL:PT30S}

# Spring liquibase
spring.liquibase.enabled=${SPRING_LIQUIBASE_ENABLED:true}
spring.liquibase.change-log=classpath:/db/readseek.xml

# Hibernate jpa ddl
spring.jpa.hibernate.ddl-auto=none

# Spring jpa
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=false

# Hibernate show sql
spring.jpa.properties.hibernate.show_sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}

# Security Properties
library.security.jwtSecret=${LIBRARY_SECURITY_JWT_SECRET:readseek-auth-secret}
library.security.jwt.accessToken.expirationMs=${LIBRARY_SECURITY_JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}
library.security.jwt.refreshToken.expirationMs=${LIBRARY_SECURITY_JWT_REFRESH_TOKEN_EXPIRATION_MS:86400000}
readseek.security.rate-limit.login.max-failures=${READSEEK_RATE_LIMIT_LOGIN_MAX_FAILURES:5}
readseek.security.rate-limit.login.window=${READSEEK_RATE_LIMIT_LOGIN_WINDOW:PT15M}
readseek.security.rate-limit.login.lock-duration=${READSEEK_RATE_LIMIT_LOGIN_LOCK_DURATION:PT15M}
readseek.security.rate-limit.refresh.max-requests=${READSEEK_RATE_LIMIT_REFRESH_MAX_REQUESTS:30}
readseek.security.rate-limit.refresh.window=${READSEEK_RATE_LIMIT_REFRESH_WINDOW:PT10M}

# Search
library.search.enabled=${LIBRARY_SEARCH_ENABLED:true}
library.search.book-index-name=${LIBRARY_SEARCH_BOOK_INDEX_NAME:readseek-resource-search-v1}
library.search.max-results=${LIBRARY_SEARCH_MAX_RESULTS:20}
library.search.vector.enabled=${LIBRARY_SEARCH_VECTOR_ENABLED:true}
library.search.vector.candidate-limit=${LIBRARY_SEARCH_VECTOR_CANDIDATE_LIMIT:20}
library.search.vector.min-score=${LIBRARY_SEARCH_VECTOR_MIN_SCORE:0.0}
library.search.embedding.enabled=${LIBRARY_SEARCH_EMBEDDING_ENABLED:true}
library.search.embedding.provider=${LIBRARY_SEARCH_EMBEDDING_PROVIDER:local-ai}
library.search.embedding.base-url=${LIBRARY_SEARCH_EMBEDDING_BASE_URL:http://127.0.0.1:8001}
library.search.embedding.model=${LIBRARY_SEARCH_EMBEDDING_MODEL:BAAI/bge-m3}
library.search.embedding.dimensions=${LIBRARY_SEARCH_EMBEDDING_DIMENSIONS:1024}
library.search.embedding.timeout-ms=${LIBRARY_SEARCH_EMBEDDING_TIMEOUT_MS:30000}
library.search.embedding.query-input-type=${LIBRARY_SEARCH_EMBEDDING_QUERY_INPUT_TYPE:query}
library.search.embedding.document-input-type=${LIBRARY_SEARCH_EMBEDDING_DOCUMENT_INPUT_TYPE:document}
library.search.reranker.enabled=${LIBRARY_SEARCH_RERANKER_ENABLED:true}
library.search.reranker.provider=${LIBRARY_SEARCH_RERANKER_PROVIDER:local-ai}
library.search.reranker.base-url=${LIBRARY_SEARCH_RERANKER_BASE_URL:http://127.0.0.1:8001}
library.search.reranker.model=${LIBRARY_SEARCH_RERANKER_MODEL:BAAI/bge-reranker-v2-m3}
library.search.reranker.timeout-ms=${LIBRARY_SEARCH_RERANKER_TIMEOUT_MS:30000}
library.search.reranker.candidate-limit=${LIBRARY_SEARCH_RERANKER_CANDIDATE_LIMIT:20}

# Bootstrap admin account for local development
library.bootstrap.admin.enabled=${LIBRARY_BOOTSTRAP_ADMIN_ENABLED:true}
library.bootstrap.admin.email=${LIBRARY_BOOTSTRAP_ADMIN_EMAIL:admin@booknook.local}
library.bootstrap.admin.password=${LIBRARY_BOOTSTRAP_ADMIN_PASSWORD:Admin123!}
library.bootstrap.admin.first-name=${LIBRARY_BOOTSTRAP_ADMIN_FIRST_NAME:System}
library.bootstrap.admin.last-name=${LIBRARY_BOOTSTRAP_ADMIN_LAST_NAME:Admin}
